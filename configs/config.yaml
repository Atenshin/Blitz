event_key: 2025miket

paths:
  videos: videos
  detections: detections
  edits: edits
  exports: exports

download:
  format: "bestvideo[height<=1080]+bestaudio/best[height<=1080]"
  container: mp4
  retries: 3
  # Substrings (case-insensitive) matched against the YouTube uploader/channel
  # name. A video is downloaded only if at least one entry here is a substring
  # of its uploader. Set to [] to allow any uploader.
  allowed_uploaders:
    - "FIRST Robotics Competition"
    - "FIRSTRoboticsCompetition"

video:
  fps: 30

detection:
  confidence: 0.35
  iou: 0.5
  imgsz: 1280
  device: 0                  # 0 = first CUDA GPU, "cpu" to disable GPU
  model_path: models/frc-2026/best.pt

training:
  dataset_yaml: datasets/labeled/Blitz.v5i.yolov8/data_split.yaml
  base_model: yolov8m.pt     # n / s / m / l / x — bigger = slower + needs more VRAM
  imgsz: 960                 # 640 fastest, 1280 most accurate; 960 is a good middle
  batch: 8                   # drop to 4 or 2 if you hit CUDA OOM
  epochs: 100
  patience: 20               # early-stop after N epochs of no val improvement
  workers: 4
  cache: ram                 # "ram" / "disk" / false — RAM cache 3-5x speedup
                             # after epoch 1; needs ~3 GB free RAM at imgsz 960
  project: models/runs
  # Roboflow already baked in flip+rotation+brightness, so we dial down
  # Ultralytics' built-in augmentations to avoid double-augmenting.
  augmentation:
    mosaic: 0.5
    mixup: 0.1
    hsv_h: 0.015
    hsv_s: 0.4
    hsv_v: 0.3
    degrees: 2.0
    translate: 0.05
    scale: 0.3
    fliplr: 0.5
    flipud: 0.0

tracking:
  max_lost_frames: 15

export:
  output: exports/event_analysis.xlsx
